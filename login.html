<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LUXURY • DRIVER LOGIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-image: url('https://images.unsplash.com/photo-1554744512-d6c603f27c54?w=900&auto=format&fit=crop&q=80');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      position: relative;
    }

    /* dark opulent overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.5) 70%, rgba(212,175,55,0.15) 100%);
      backdrop-filter: blur(1px);
      z-index: 1;
    }

    /* phone frame – max width 430px */
    .login-frame {
      max-width: 430px;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    /* luxury glass card */
    .login-card {
      width: 100%;
      background: rgba(10, 10, 10, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 28px;
      padding: 32px 24px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.9), 0 0 0 1px rgba(212,175,55,0.2) inset;
    }

    /* emblem / greeting */
    .greeting {
      text-align: center;
      margin-bottom: 32px;
    }

    .greeting .luxury-icon {
      font-size: 32px;
      color: #d4af37;
      margin-bottom: 8px;
      letter-spacing: 4px;
    }

    .greeting h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    }

    .greeting p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    /* input fields – refined minimalism */
    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #d4af37;
      margin-bottom: 6px;
      font-weight: 400;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 16px;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .input-field:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-weight: 300;
      font-size: 14px;
    }

    /* extras row (remember + forgot) */
    .row-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0 30px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #d4af37;
      background: transparent;
      border: 1px solid #d4af37;
      border-radius: 2px;
    }

    .forgot-link {
      color: #d4af37;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.5px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .forgot-link:hover {
      border-bottom-color: #d4af37;
    }

    /* login button – pure static gold */
    .login-btn {
      width: 100%;
      background: #d4af37;
      border: none;
      border-radius: 40px;
      padding: 18px 24px;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0a0a0a;
      cursor: pointer;
      box-shadow: 0 10px 20px -8px rgba(0,0,0,0.5);
      transition: none;  /* no hover effect */
      margin-bottom: 24px;
      border: 1px solid rgba(255,215,0,0.3);
    }

    /* signup redirect */
    .signup-text {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .signup-text a {
      color: #d4af37;
      text-decoration: none;
      border-bottom: 1px solid #d4af37;
      padding-bottom: 2px;
      margin-left: 6px;
      font-weight: 500;
    }

    .signup-text a:hover {
      opacity: 0.9;
    }

    /* subtle divider with gold dot */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 10px;
    }

    .divider-line {
      height: 1px;
      width: 30%;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    .divider-dot {
      width: 6px;
      height: 6px;
      background: #d4af37;
      border-radius: 50%;
      opacity: 0.8;
    }

    /* no hover animations – pure static luxury */
  </style>
</head>
<body>
  <div class="login-frame">
    <div class="login-card">
      
      <!-- greeting emblem -->
      <div class="greeting">
        <div class="luxury-icon">✦ ⚡ ✦</div>
        <h2>Driver's Lounge</h2>
        <p>sign in with your credentials</p>
      </div>

      <!-- login form (no actual submit) -->
      <form id="luxuryLoginForm" action="#" method="post">
        <div class="input-group">
          <label>E‑mail / Username</label>
          <input type="email" class="input-field" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" class="input-field" placeholder="••••••••" required>
        </div>

        <div class="row-options">
          <label class="remember">
            <input type="checkbox" checked> Keep me signed in
          </label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>

        <!-- static login button (no hover effects) -->
        <button type="button" class="login-btn" id="loginButton">START ENGINE</button>

        <!-- subtle divider (optional) -->
        <div class="divider">
          <span class="divider-line"></span>
          <span class="divider-dot"></span>
          <span class="divider-line"></span>
        </div>

        <div class="signup-text">
          New driver? <a href="#">CREATE ACCOUNT</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const loginBtn = document.getElementById('loginButton');

      if (loginBtn) {
        loginBtn.addEventListener('click', function(e) {
          e.preventDefault();

          // Minimal, elegant feedback – just like the previous page
          const toast = document.createElement('div');
          toast.textContent = '✦  WELCOME BACK  ✦';
          toast.style.position = 'absolute';
          toast.style.bottom = '120px';
          toast.style.left = '50%';
          toast.style.transform = 'translateX(-50%)';
          toast.style.backgroundColor = 'rgba(10,10,10,0.85)';
          toast.style.backdropFilter = 'blur(12px)';
          toast.style.color = '#d4af37';
          toast.style.padding = '12px 32px';
          toast.style.borderRadius = '50px';
          toast.style.fontFamily = "'Playfair Display', serif";
          toast.style.letterSpacing = '3px';
          toast.style.fontSize = '16px';
          toast.style.border = '1px solid #d4af37';
          toast.style.boxShadow = '0 15px 30px -10px black';
          toast.style.zIndex = '999';
          toast.style.whiteSpace = 'nowrap';
          toast.style.maxWidth = '90%';
          toast.style.textAlign = 'center';
          document.body.appendChild(toast);

          setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.5s';
            setTimeout(() => toast.remove(), 600);
          }, 1700);
        });
      }

      // Prevent any accidental form reload
      const form = document.getElementById('luxuryLoginForm');
      if (form) {
        form.addEventListener('submit', (e) => e.preventDefault());
      }
    })();
  </script>
</body>
</html>
